#
# 文件速览：
# 1. 文件职责：定义真实 MySQL 专项回归的测试配置，供 `mysql-test` profile 使用。
# 2. 关键结构：MySQL 测试库连接、mybatis-plus、app.jwt.secret、强制改密开关。
# 3. 阅读建议：先确认环境变量，再执行 MySQL 专项用例。
#
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_TEST_URL:jdbc:mysql://localhost:3306/sme_recruitment_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${MYSQL_TEST_USERNAME:root}
    password: ${MYSQL_TEST_PASSWORD:}
  sql:
    init:
      mode: never
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    # 真实 MySQL 口径下默认关闭 SQL 控制台输出，避免专项回归日志过于嘈杂。
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

app:
  jwt:
    # 仅用于测试环境的固定密钥，避免影响主环境密钥治理。
    secret: ${APP_TEST_JWT_SECRET:test-only-jwt-secret-for-automation-123456}
    # MySQL 专项回归沿用 30 分钟，保持与默认测试口径一致。
    expire-ms: ${APP_TEST_JWT_EXPIRE_MS:1800000}
  auth:
    force-password-change:
      enabled: true
