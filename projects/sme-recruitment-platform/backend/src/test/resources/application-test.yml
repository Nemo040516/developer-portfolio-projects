#
# 文件速览：
# 1. 文件职责：定义后端 H2 测试基线配置，供默认 `test` profile 使用。
# 2. 关键结构：内存数据源、mybatis-plus、app.jwt.secret、app.auth.force-password-change。
# 3. 阅读建议：先看 datasource，再看底部 app 测试口径。
#
spring:
  # Task 1 先使用 H2 建立最小 smoke 基线，保证测试入口在本地可直接运行；
  # Task 2 起若需要真实 SQL 行为，再补 MySQL / Testcontainers 方案。
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:sme_recruitment_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    # 测试阶段关闭 SQL 标准输出，减少 smoke 日志噪音。
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

app:
  jwt:
    # 仅用于测试环境的固定密钥，避免影响主环境密钥治理。
    secret: ${APP_TEST_JWT_SECRET:test-only-jwt-secret-for-automation-123456}
    # 测试环境继续保持 30 分钟，避免自动化用例口径被演示环境默认值影响。
    expire-ms: ${APP_TEST_JWT_EXPIRE_MS:1800000}
  auth:
    force-password-change:
      # 测试口径默认打开强制改密开关，用例按是否存在 RESET_PASSWORD 日志决定是否提示。
      enabled: true
